services:
  backend:
    image: eclipse-temurin:17-jre
    working_dir: /app
    command: ["java", "-jar", "/app/backend.jar"]
    environment:
      SPRING_PROFILES_ACTIVE: local
      JWT_SECRET: ${JWT_SECRET:-neosquare-docker-local-secret-key-needs-at-least-32-bytes}
      JWT_REFRESH_TOKEN_COOKIE_SECURE: "false"
    volumes:
      - ./deploy/backend.jar:/app/backend.jar:ro
      - backend-data:/app/data
    expose:
      - "8080"

  frontend:
    image: nginx:1.27-alpine
    depends_on:
      - backend
    volumes:
      - ./deploy/frontend-dist:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "5173:80"

volumes:
  backend-data:
