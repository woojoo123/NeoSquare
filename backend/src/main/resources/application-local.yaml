spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3306/neosquare}
    driver-class-name: org.mariadb.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}

app:
  seed-demo-data: true
